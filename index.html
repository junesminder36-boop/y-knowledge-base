<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优码城市更新智库 - 政策解读与行业案例</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4C64FE;
            --primary-dark: #3A4FD9;
            --secondary-color: #F8F9FA;
            --text-color: #333333;
            --text-light: #666666;
            --border-color: #E9ECEF;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif; line-height: 1.6; color: var(--text-color); background-color: #f5f7fb; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* 头部和导航 */
        header { background: white; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 1000; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon { width: 40px; height: 40px; background: var(--primary-color); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        .logo-text h1 { font-size: 24px; color: var(--primary-color); font-weight: 600; }
        nav ul { display: flex; gap: 30px; list-style: none; }
        nav a { text-decoration: none; color: var(--text-color); font-weight: 500; padding: 8px 16px; border-radius: var(--radius); }
        nav a.active { color: var(--primary-color); background-color: rgba(76, 100, 254, 0.1); }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .btn { padding: 8px 20px; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 500; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: var(--secondary-color); color: var(--text-color); border: 1px solid var(--border-color); }
        .btn-danger { background: #DC3545; color: white; }

        /* 主体布局 */
        main { min-height: 80vh; padding: 40px 0; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 文章卡片 (增加封面图布局) */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .articles-list { display: grid; gap: 20px; }
        .article-card-item { background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); display: flex; gap: 20px; align-items: flex-start; cursor: pointer; transition: transform 0.2s;}
        .article-card-item:hover { transform: translateY(-3px); }
        .article-cover { width: 160px; height: 110px; object-fit: cover; border-radius: 6px; flex-shrink: 0; border: 1px solid var(--border-color);}
        .article-content { flex: 1; }
        .article-content h3 { font-size: 18px; margin-bottom: 8px; color: var(--primary-dark);}
        .article-meta { display: flex; gap: 15px; color: var(--text-light); font-size: 13px; margin-bottom: 8px; }
        .article-summary { color: var(--text-color); font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .article-tag { display: inline-block; padding: 3px 10px; background: rgba(76,100,254,0.1); color: var(--primary-color); border-radius: 20px; font-size: 12px; margin-top: 10px;}

        /* 文章详情 */
        .article-detail { background: white; border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow); }
        .article-detail-cover { width: 100%; max-height: 450px; object-fit: cover; border-radius: var(--radius); margin-bottom: 30px; }
        .article-header h2 { font-size: 32px; margin-bottom: 15px; }
        .article-header .meta { display: flex; gap: 20px; color: var(--text-light); margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;}
        
        /* 表单与富文本 */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        #editor-container { height: 500px; background: white; border-bottom-left-radius: 6px; border-bottom-right-radius: 6px; font-size: 16px;}
        .ql-toolbar { border-top-left-radius: 6px; border-top-right-radius: 6px; background: #f8f9fa;}
        
        /* 模态框 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: var(--radius); width: 400px; }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="#" class="logo" onclick="switchPage('home')">
                <div class="logo-icon">UR</div>
                <div class="logo-text"><h1>优码城市智库</h1></div>
            </a>
            <nav>
                <ul>
                    <li><a href="#" onclick="switchPage('home')" class="nav-link active" data-page="home">全部文章</a></li>
                </ul>
            </nav>
            <div class="header-right">
                <div id="login-button"><button class="btn btn-secondary" onclick="document.getElementById('login-modal').classList.add('active')">管理员登录</button></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="home-page" class="page active">
            <div class="page-header"><h2>最新发布</h2></div>
            <div class="articles-list" id="home-articles">加载中...</div>
        </div>

        <div id="article-detail-page" class="page">
            <button class="btn btn-secondary" onclick="switchPage('home')" style="margin-bottom: 20px;">← 返回列表</button>
            <div class="article-detail" id="article-detail-content"></div>
        </div>

        <div id="admin-page" class="page">
            <div class="page-header">
                <h2>后台管理控制台</h2>
                <button class="btn btn-primary" onclick="showAddForm()">+ 发布精美文章</button>
            </div>
            
            <div id="article-form" style="display: none; background: #fff; padding: 30px; border-radius: 8px; margin-bottom: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <h3 style="margin-bottom: 20px; color: var(--primary-color);">✍️ 编辑新内容</h3>
                <form onsubmit="saveArticle(event)">
                    <div class="form-row">
                        <div class="form-group"><label>文章标题</label><input type="text" class="form-control" id="form-title" required></div>
                        <div class="form-group">
                            <label>设置封面图 (可选, 推荐 16:9)</label>
                            <input type="file" class="form-control" id="form-cover" accept="image/png, image/jpeg, image/gif">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>文章分类</label>
                            <select class="form-control" id="form-category">
                                <option value="政策解读">政策解读</option>
                                <option value="行业案例">行业案例</option>
                                <option value="数字化方案">数字化方案</option>
                            </select>
                        </div>
                        <div class="form-group"><label>作者 / 来源</label><input type="text" class="form-control" id="form-author" value="优码科技"></div>
                    </div>
                    <div class="form-group"><label>核心摘要 (用于列表显示)</label><textarea class="form-control" id="form-summary" rows="2" required></textarea></div>
                    
                    <div class="form-group">
                        <label>正文排版区 (支持直接粘贴图片)</label>
                        <div id="editor-container"></div>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="submit" class="btn btn-primary" id="save-btn" style="flex: 1; font-size: 16px; padding: 12px;">🚀 确认发布到官网</button>
                        <button type="button" class="btn btn-secondary" onclick="document.getElementById('article-form').style.display='none'">取消</button>
                    </div>
                </form>
            </div>
            
            <h3>已发布文章管理</h3>
            <div class="articles-list" id="admin-articles" style="margin-top: 20px;"></div>
        </div>
    </main>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px; text-align: center;">管理员通行证</h2>
            <div class="form-group"><label>账号</label><input type="text" class="form-control" id="login-username" placeholder="请输入 admin"></div>
            <div class="form-group"><label>密码</label><input type="password" class="form-control" id="login-password" placeholder="请输入 123456"></div>
            <button class="btn btn-primary" onclick="login()" style="width: 100%; margin-top: 10px;">登录</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <script>
        // ========================================================
        // 🚨【非常重要】请务必在这里重新填入你的真实 URL 和 API KEY！
        // ========================================================
        const SUPABASE_URL = 'https://pmrolepmqmslcrrzfkql.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_nCrNvfF6tpmZ16QqUQxFVA_t9kNjwar';
        
        const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
        let quillEditor; // 富文本编辑器实例

        // 页面加载完毕初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 初始化 Quill 富文本编辑器
            quillEditor = new Quill('#editor-container', {
                theme: 'snow',
                placeholder: '请在这里开始你的专业排版...（你可以选中文字加粗，或者直接粘贴图片进来）',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }], // 标题大小
                        ['bold', 'italic', 'underline'],  // 加粗、斜体、下划线
                        [{ 'color': [] }, { 'background': [] }], // 字体颜色、背景色
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }], // 列表
                        ['link', 'image', 'video'], // 链接、图片、视频
                        ['clean'] // 清除格式
                    ]
                }
            });

            checkLogin();
            await fetchArticles();
        });

        // 1. 获取文章数据
        async function fetchArticles() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/articles?select=*&order=id.desc`, { headers });
                const articles = await res.json();
                renderList(articles);
            } catch (err) { console.error('拉取失败:', err); }
        }

        // 2. 渲染文章列表
        function renderList(articles) {
            const html = articles.map(a => `
                <div class="article-card-item" onclick="viewArticle(${a.id}, '${escapeHTML(a.title)}')">
                    ${a.cover_image ? `<img src="${a.cover_image}" class="article-cover">` : `<div class="article-cover" style="background:#e9ecef; display:flex; align-items:center; justify-content:center; color:#999;">暂无封面</div>`}
                    <div class="article-content">
                        <h3>${a.title}</h3>
                        <div class="article-meta"><span>作者: ${a.author}</span> <span>${a.date}</span></div>
                        <p class="article-summary">${a.summary}</p>
                        <span class="article-tag">${a.category}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('home-articles').innerHTML = html || '<p>暂无文章</p>';
            
            // 渲染后台管理列表
            document.getElementById('admin-articles').innerHTML = articles.map(a => `
                <div class="article-card-item" style="align-items: center;">
                    <div style="flex:1"><b>${a.title}</b> (${a.date})</div>
                    <button class="btn btn-danger" onclick="deleteArticle(${a.id})">删除</button>
                </div>
            `).join('');
        }

        // 3. 发布/保存文章 (包含上传封面图逻辑)
        async function saveArticle(event) {
            event.preventDefault();
            const saveBtn = document.getElementById('save-btn');
            saveBtn.textContent = '上传处理中，请稍候...';
            saveBtn.disabled = true;

            const fileInput = document.getElementById('form-cover');
            let uploadedCoverUrl = null;

            // 如果选择了封面图，先上传到 Supabase Storage
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_cover.${fileExt}`; // 生成唯一文件名
                
                try {
                    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/images/${fileName}`, {
                        method: 'POST',
                        headers: { ...headers, 'Content-Type': file.type },
                        body: file
                    });
                    if (uploadRes.ok) {
                        // 拼接公网可访问的图片地址
                        uploadedCoverUrl = `${SUPABASE_URL}/storage/v1/object/public/images/${fileName}`;
                    } else {
                        alert('封面图上传失败！但文章正文会继续保存。');
                    }
                } catch (e) { console.error('图片上传网络错误', e); }
            }

            // 获取富文本里的所有带排版的 HTML 内容！
            const richContentHTML = quillEditor.root.innerHTML;

            const articleData = {
                title: document.getElementById('form-title').value,
                summary: document.getElementById('form-summary').value,
                category: document.getElementById('form-category').value,
                author: document.getElementById('form-author').value,
                content: richContentHTML, // 存入带排版的 HTML
                cover_image: uploadedCoverUrl, // 存入云端图片链接
                date: new Date().toISOString().split('T')[0]
            };

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/articles`, {
                    method: 'POST',
                    headers: { ...headers, 'Content-Type': 'application/json' },
                    body: JSON.stringify(articleData)
                });
                
                if (res.ok) {
                    alert('🎉 文章发布成功！');
                    document.getElementById('article-form').style.display = 'none';
                    await fetchArticles(); // 刷新列表
                }
            } catch (err) { alert('发布失败请检查网络'); }
            
            saveBtn.textContent = '🚀 确认发布到官网';
            saveBtn.disabled = false;
        }

        // 4. 查看文章详情
        async function viewArticle(id, title) {
            try {
                // 单独去数据库拉取这篇文章的完整内容
                const res = await fetch(`${SUPABASE_URL}/rest/v1/articles?id=eq.${id}`, { headers });
                const data = await res.json();
                if (data.length > 0) {
                    const a = data[0];
                    const coverHtml = a.cover_image ? `<img src="${a.cover_image}" class="article-detail-cover">` : '';
                    
                    document.getElementById('article-detail-content').innerHTML = `
                        <div class="article-header">
                            <h2>${a.title}</h2>
                            <div class="meta"><span>${a.author}</span> <span>${a.date}</span> <span>来源: ${a.category}</span></div>
                        </div>
                        ${coverHtml}
                        <div class="ql-editor" style="padding: 0; font-size: 16px;">${a.content}</div>
                    `;
                    switchPage('article-detail');
                }
            } catch (err) { console.error(err); }
        }

        // 5. 删除文章
        async function deleteArticle(id) {
            if(!confirm('确定永久删除吗？')) return;
            await fetch(`${SUPABASE_URL}/rest/v1/articles?id=eq.${id}`, { method: 'DELETE', headers });
            fetchArticles();
        }

        // 辅助功能：页面切换与登录
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            window.scrollTo(0, 0);
        }

        function showAddForm() {
            document.querySelector('form').reset();
            quillEditor.setContents([]); // 清空排版面板
            document.getElementById('article-form').style.display = 'block';
        }

        function login() {
            if (document.getElementById('login-username').value === 'admin' && document.getElementById('login-password').value === '123456') {
                localStorage.setItem('isAdmin', 'true');
                document.getElementById('login-modal').classList.remove('active');
                checkLogin();
                alert('登录成功！已解锁后台管理权限。');
            } else { alert('密码错误'); }
        }

        function checkLogin() {
            if (localStorage.getItem('isAdmin') === 'true') {
                document.getElementById('login-button').innerHTML = `<button class="btn btn-secondary" onclick="localStorage.removeItem('isAdmin'); checkLogin(); switchPage('home');">退出管理</button>`;
                if(!document.querySelector('[data-page="admin"]')) {
                    document.querySelector('nav ul').insertAdjacentHTML('beforeend', '<li><a href="#" onclick="switchPage(\'admin\')" class="nav-link" data-page="admin" style="color:var(--primary-color);">后台管理</a></li>');
                }
            } else {
                document.getElementById('login-button').innerHTML = `<button class="btn btn-secondary" onclick="document.getElementById('login-modal').classList.add('active')">管理员登录</button>`;
                const adminNav = document.querySelector('[data-page="admin"]');
                if(adminNav) adminNav.parentElement.remove();
            }
        }
        
        function escapeHTML(str) { return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)); }
    </script>
</body>
</html>
